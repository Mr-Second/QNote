name: Release

# 触发条件：push 匹配 v* 的 tag（v0.1.0、v0.2.0-beta 等）
on:
  push:
    tags:
      - 'v*'

# 避免 Concurrent 同一 tag 多次 push 时并行 build
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# Release 上传需要 write 权限
permissions:
  contents: write

jobs:
  build:
    name: Build & Release (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 需要完整 git 历史 + tags，让 xmake.lua 的 git_version() 能 git describe 取到触发 tag
          fetch-depth: 0

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          build-cache: true
          build-cache-key: windows-x64-release

      - name: Setup Qt 6.9.3 (msvc2022_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: 'false'

      - name: Cache HuskarUI package
        id: cache-huskarui
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/huskarui.zip
          key: huskarui-v0.6.1-beta-msvc2022-qt6.9.3

      - name: Install HuskarUI v0.6.1-beta
        shell: pwsh
        run: |
          # HuskarUI 是 Qt 之外的第三方 QML 组件库，需要单独安装到 Qt 目录
          # 包内结构：HuskarUI/lib/..., HuskarUI/bin/..., HuskarUI/include/...
          # 需要把 HuskarUI/ 内部内容合并到 Qt 目录（D:\a\QNote\Qt\6.9.3\msvc2022_64\）
          $qtDir = $env:QT_ROOT_DIR
          if (-not $qtDir) { $qtDir = "D:\a\QNote\Qt\6.9.3\msvc2022_64" }
          $zip = "${{ runner.temp }}/huskarui.zip"
          $extractTmp = "$env:TEMP\huskarui-extract"
          if (-not (Test-Path $zip)) {
            $url = "https://github.com/mengps/HuskarUI/releases/download/v0.6.1-beta/HuskarUI_v0.6.1-beta_win64_msvc2022_64_Qt6.9.3.zip"
            Write-Host "Downloading HuskarUI v0.6.1-beta from $url"
            Invoke-WebRequest -Uri $url -OutFile $zip
          } else {
            Write-Host "Using cached HuskarUI zip"
          }
          Write-Host "Extracting to temp dir: $extractTmp"
          if (Test-Path $extractTmp) { Remove-Item $extractTmp -Recurse -Force }
          Expand-Archive -Path $zip -DestinationPath $extractTmp -Force
          $huskRoot = Join-Path $extractTmp "HuskarUI"
          if (-not (Test-Path $huskRoot)) { $huskRoot = $extractTmp }
          Write-Host "Merging HuskarUI files into Qt dir: $qtDir"
          Copy-Item -Path "$huskRoot\*" -Destination $qtDir -Recurse -Force
          Write-Host "HuskarUI installed. Verifying:"
          Get-ChildItem "$qtDir\lib\HuskarUIBasic.lib" -ErrorAction SilentlyContinue | ForEach-Object { "  lib: $($_.FullName)" }
          Get-ChildItem "$qtDir\bin\HuskarUIBasic.dll" -ErrorAction SilentlyContinue | ForEach-Object { "  dll: $($_.FullName)" }

      - name: Install conan (for xapian-core package)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install conan
          # conan center 上 xapian-core 1.4.24 Windows 只有 compiler.version=192 的二进制
          # CI runner VS 17.5+ 被 conan detect 为 195，找不到 binary → 从源码编译（15+ 分钟）
          # 直接用 conan config edit 锁定 profile（避免 sed/正则的编码问题）
          conan profile detect --force
          # 用临时文件替换，避免读写同一文件
          $profilePath = "$env:USERPROFILE\.conan2\profiles\default"
          $tmpPath = "$env:TEMP\conan-profile.txt"
          Get-Content $profilePath | ForEach-Object {
            if ($_ -match '^compiler\.version=') { "compiler.version=192" }
            elseif ($_ -match '^compiler\.cppstd=') { "compiler.cppstd=14" }
            else { $_ }
          } | Out-File -FilePath $tmpPath -Encoding ascii
          Move-Item -Path $tmpPath -Destination $profilePath -Force
          Write-Host "--- conan profile (after patch) ---"
          Get-Content $profilePath
          # 强制校验
          $content = Get-Content $profilePath -Raw
          if ($content -notmatch 'compiler\.version=192') {
            Write-Error "Failed to pin compiler.version=192 in conan profile"
            exit 1
          }
          Write-Host "OK: compiler.version pinned to 192"

      - name: Cache conan packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.conan2/p
          key: conan-windows-x64-msvc192-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            conan-windows-x64-msvc192-

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: ~/.xmake/cache/packages
          key: xmake-pkgs-windows-x64-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-pkgs-windows-x64-

      - name: Verify version resolves from tag
        shell: pwsh
        run: |
          # 版本号由 xmake.lua 的 git_version() 从 git tag 动态派生（打 tag 即发版，无需手动维护版本字段）。
          # 本步骤校验 git describe 在 CI 环境能正确取到触发 tag，防止 fetch/shallow-clone 问题导致版本错乱。
          $tagVer = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "Triggered tag version: $tagVer"
          $gitTag = (git describe --tags --abbrev=0) -replace '^v', ''
          Write-Host "git describe output: $gitTag"
          if ($gitTag -ne $tagVer) {
            Write-Error "Version mismatch: git describe=$gitTag triggered tag=$tagVer. Check fetch-depth / tag placement."
            exit 1
          }
          Write-Host "OK: version resolves to $tagVer from tag"

      - name: Configure (xmake f, verbose)
        shell: pwsh
        timeout-minutes: 10
        run: |
          # xmake 语法：xmake [task] [options] [target]
          # 通用选项（-v -y）必须在 task 之后、target 之前
          xmake f -v -y -p windows -a x64 -m release

      - name: Build QNotePack
        shell: pwsh
        run: |
          xmake build -y QNotePack

      - name: Package (nsis + zip)
        shell: pwsh
        run: |
          xmake pack -y QNote

      - name: Collect artifacts
        id: collect
        shell: pwsh
        run: |
          $pkgDir = "build\xpack\QNote"
          if (-not (Test-Path $pkgDir)) {
            Write-Error "xpack output dir not found: $pkgDir"
            exit 1
          }
          $files = Get-ChildItem $pkgDir -File | Select-Object -ExpandProperty FullName
          Write-Host "Artifacts to upload:"
          $files | ForEach-Object { Write-Host "  $_" }
          # 输出多行文件列表给后续 step 用（用 GITHUB_ENV 或直接在下一个 step glob）

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/xpack/QNote/QNote-Setup-*.exe
            build/xpack/QNote/QNote-Portable-*.zip
          fail_on_unmatched_files: true
          body_path: release-notes/${{ github.ref_name }}.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
