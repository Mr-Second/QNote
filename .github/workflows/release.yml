name: Release

# 触发条件：push 匹配 v* 的 tag（v0.1.0、v0.2.0-beta 等）
on:
  push:
    tags:
      - 'v*'

# 避免 Concurrent 同一 tag 多次 push 时并行 build
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# Release 上传需要 write 权限
permissions:
  contents: write

jobs:
  build:
    name: Build & Release (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          build-cache: true
          build-cache-key: windows-x64-release

      - name: Setup Qt 6.9.3 (msvc2022_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: 'false'

      - name: Install conan (for xapian-core package)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install conan
          # 锁定 conan profile 为 msvc/193（VS 2022）以匹配 conancenter 预编译包
          # conan center 上 xapian-core 1.4.24 只有 compiler.version=192 的 Windows 二进制，
          # 但 conan 2.x binary 兼容性回退能匹配 193。
          # CI runner 上的 VS 可能被检测为其他版本号（如 2026），导致找不到 binary 而从源码编译。
          conan profile detect --force
          $profilePath = "$env:USERPROFILE\.conan2\profiles\default"
          (Get-Content $profilePath) -replace 'compiler.version=.*', 'compiler.version=193' | Set-Content $profilePath
          Write-Host "--- conan profile ---"
          Get-Content $profilePath

      - name: Cache conan packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.conan2/p
          key: conan-windows-x64-msvc193-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            conan-windows-x64-msvc193-

      - name: Configure (xmake f, verbose)
        shell: pwsh
        timeout-minutes: 10
        run: |
          # xmake 语法：xmake [task] [options] [target]
          # 通用选项（-v -y）必须在 task 之后、target 之前
          xmake f -v -y -p windows -a x64 -m release

      - name: Build QNotePack
        shell: pwsh
        run: |
          xmake build -y QNotePack

      - name: Package (nsis + zip)
        shell: pwsh
        run: |
          xmake pack -y QNote

      - name: Collect artifacts
        id: collect
        shell: pwsh
        run: |
          $pkgDir = "build\xpack\QNote"
          if (-not (Test-Path $pkgDir)) {
            Write-Error "xpack output dir not found: $pkgDir"
            exit 1
          }
          $files = Get-ChildItem $pkgDir -File | Select-Object -ExpandProperty FullName
          Write-Host "Artifacts to upload:"
          $files | ForEach-Object { Write-Host "  $_" }
          # 输出多行文件列表给后续 step 用（用 GITHUB_ENV 或直接在下一个 step glob）

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/xpack/QNote/QNote-Setup-*.exe
            build/xpack/QNote/QNote-Portable-*.zip
          fail_on_unmatched_files: true
          body_path: release-notes/${{ github.ref_name }}.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
